<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<!-- Título exibido na aba do navegador ao visualizar o PDF -->
<title>InOutControl — Relatório de Peças</title>

<!-- Importa o CSS externo -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>
<body class="pdf">

<!-- Cabeçalho padrão igual ao relatório de movimentações -->
<div class="header">
    <h1>InOutControl</h1>
    <h2>Relatório de Peças — Dia {{ dia }}</h2>
</div>

<!-- Tabela com os campos solicitados -->
<table>
<thead>
    <tr>
        <th>Código</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Quantidade</th>
    </tr>
</thead>

<tbody>
{% for p in pecas %}
    <tr>
        <td>{{ p.codigo }}</td>
        <td>{{ p.nome }}</td>
        <td>{{ p.descricao if p.descricao else '-' }}</td>
        <td>{{ p.quantidade }}</td>
    </tr>
{% endfor %}
</tbody>
</table>

<!-- Rodapé padrão -->
<div class="footer">
    Relatório gerado automaticamente pelo sistema InOutControl.
</div>

</body>
</html>
