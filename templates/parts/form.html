{% extends "base.html" %}
{% block title %}InOutControl — Peças{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body p-4">

        <h4 class="fw-bold mb-4">
            <i class="bi bi-gear"></i>
            {% if part %}Editar Peça{% else %}Nova Peça{% endif %}
        </h4>

        <form method="POST" enctype="multipart/form-data">

            <div class="row">
                <!-- Coluna Esquerda -->
                <div class="col-md-6">

                    <!-- Código -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Código</label>
                        <input type="text" name="codigo" class="form-control form-control-sm"
                               value="{{ part.codigo if part else '' }}" required>
                    </div>

                    <!-- Nome -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome</label>
                        <input type="text" name="nome" class="form-control form-control-sm"
                               value="{{ part.nome if part else '' }}" required>
                    </div>

                    <!-- Quantidade -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Quantidade</label>
                        <input type="number" name="quantidade" class="form-control form-control-sm"
                               value="{{ part.quantidade if part else '' }}" required>
                    </div>

                </div>

                <!-- Coluna Direita -->
                <div class="col-md-6">

                    <!-- Valor de Custo -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Valor de Custo</label>
                        <input type="text" name="valor_custo" class="form-control form-control-sm"
                               value="{{ part.valor_custo if part else '' }}" required>
                    </div>

                    <!-- Descrição -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descrição</label>
                        <textarea name="descricao" class="form-control form-control-sm" rows="4">{{ part.descricao if part else '' }}</textarea>
                    </div>

                    <!-- Foto -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Foto da Peça</label>
                        <input type="file" name="foto_arquivo" class="form-control form-control-sm" accept="image/*">

                        {% if part and part.foto %}
                        <div class="mt-2">
                            <small class="text-muted">Foto atual:</small><br>
                            <img src="{{ url_for('uploaded_file', filename=part.foto) }}"
                                 alt="Foto da peça" class="img-thumbnail mt-1" style="max-width: 150px;">
                        </div>
                        {% endif %}
                    </div>

                </div>
            </div>

            <!-- Botões com ícones -->
            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="{{ url_for('parts.list_parts') }}" 
                   class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
                <button type="submit" 
                        class="btn btn-primary btn-sm px-3 d-flex align-items-center gap-1">
                    <i class="bi bi-check-circle"></i> Salvar
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
