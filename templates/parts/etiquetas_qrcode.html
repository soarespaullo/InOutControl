<!DOCTYPE html>
<html>
<head>
    <!-- Título exibido na aba do navegador ao visualizar o PDF -->
    <title>InOutControl — Etiqueta QR Code</title>
</head>

<body class="etq-grid">

{% for e in etiquetas %}
<div class="etq-small">
    <img src="data:image/png;base64,{{ e.qr }}" class="qr">
    <strong>{{ e.codigo }}</strong><br>
    {{ e.nome }}
</div>
{% endfor %}

</body>
</html>
