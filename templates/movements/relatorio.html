{% extends "base.html" %}
{% block title %}Relatório Mensal{% endblock %}

{% block content %}
<h1><i class="bi bi-bar-chart"></i> Relatório Mensal</h1>

<form method="get" class="row g-3 mb-4">
  <div class="col-md-3">
    <label class="form-label">Ano</label>
    <input type="number" class="form-control" name="ano" value="{{ ano }}">
  </div>
  <div class="col-md-3">
    <label class="form-label">Mês</label>
    <input type="number" class="form-control" name="mes" value="{{ mes }}">
  </div>
  <div class="col-md-3 d-flex align-items-end">
    <button class="btn btn-primary w-100">Gerar</button>
  </div>
</form>

<canvas id="grafico" height="120"></canvas>

{% endblock %}

{% block scripts %}
{{ super() }}
<script>
const ctx = document.getElementById('grafico');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: {{ labels|tojson }},
    datasets: [{
      label: 'Movimentações por dia',
      data: {{ valores|tojson }},
      backgroundColor: 'rgba(54, 162, 235, 0.7)',
      borderRadius: 6
    }]
  }
});
</script>
{% endblock %}
