{% extends "base.html" %}
{% block title %}Backup do Banco{% endblock %}

{% block content %}
<div class="container">

    <h3 class="fw-bold mb-4">
        <i class="bi bi-hdd-stack"></i> Gerenciamento de Backup
    </h3>

    <div class="row g-4">

        <!-- EXPORTAR -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4">

                    <h5 class="fw-bold mb-3 text-danger">
                        <i class="bi bi-download"></i> Exportar Backup
                    </h5>

                    <form method="POST" action="{{ url_for('backup.backup_execute') }}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nome do arquivo</label>
                            <input type="text" name="nome" class="form-control"
                                   placeholder="ex: backup_servidor" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Senha do ZIP</label>
                            <input type="password" name="senha" class="form-control"
                                   placeholder="Digite a senha" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-danger w-100">
                                <i class="bi bi-file-zip"></i> Gerar Backup ZIP
                            </button>

                            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary w-50">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>

                    </form>

                </div>
            </div>
        </div>

        <!-- IMPORTAR -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4">

                    <h5 class="fw-bold mb-3 text-primary">
                        <i class="bi bi-upload"></i> Importar Backup
                    </h5>

                    <form method="POST" action="{{ url_for('backup.backup_import') }}" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Arquivo ZIP</label>
                            <input type="file" name="arquivo" class="form-control" accept=".zip" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Senha do ZIP</label>
                            <input type="password" name="senha" class="form-control"
                                   placeholder="Digite a senha" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary w-100">
                                <i class="bi bi-arrow-repeat"></i> Restaurar Backup
                            </button>

                            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary w-50">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
